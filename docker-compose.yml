version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: my-word-box-postgres
    restart: always
    environment:
      POSTGRES_DB: mywordbox
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - word-box-network

volumes:
  postgres_data:
    driver: local

networks:
  word-box-network:
    driver: bridge